[pytest]
filterwarnings =
    ignore::django.utils.deprecation.RemovedInDjango60Warning
    ignore::UserWarning:django.core.handlers.base
DJANGO_SETTINGS_MODULE = myproject.settings_test
python_files = tests.py test_*.py *_tests.py

[run]
omit =
    */migrations/*
    */admin.py
    manage.py
    */asgi.py
    */wsgi.py
    */settings.py
    */settings_test.py

[report]
exclude_lines =
    pragma: no cover