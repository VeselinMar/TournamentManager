{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5" style="max-width: 800px;">
  <h1 class="page-title mb-4">Teams</h1>

  {% if teams %}
    <div class="team-list d-flex flex-column gap-3">
      {% for team in teams %}
        <div class="card">
          <a href="{% url 'team-detail' tournament_id=tournament.id pk=team.pk %}" class="team-link">
            {{ team.name }}
          </a>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p>No teams available.</p>
  {% endif %}

  <div class="mt-4 text-center">
    <a href="{% url 'team-create' tournament.id %}" class="button-primary">Add Team</a>
  </div>
</div>
{% endblock %}
