worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        listen [::]:80;

        location /static/ {
            alias /app/staticfiles/;
        }

        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /500.html;
        location = /500.html {
            root /usr/share/nginx/html;
        }
    }
}
```

A few differences from Mom-To-Be worth noting:

- No `media` location in nginx — TournamentManager uses Azure Blob Storage for media in production and local filesystem in development, so nginx doesn't need to serve it
- `depends_on` uses `condition: service_healthy` on the db — this waits for Postgres to actually be ready before starting the web container, avoiding migration errors on first run
- Postgres bumped to version 15 from 13
- Removed `DJANGO_SECRET_KEY` from the web service environment since it's already covered by `env_file: .env`

Make sure your `.env` file has at minimum:
```
SECRET_KEY=
DEBUG=False
DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
DB_USER=
DB_PASSWORD=
DB_NAME=
ALLOWED_HOSTS=localhost,127.0.0.1